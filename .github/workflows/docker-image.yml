name: Build and Publish Docker Image

on:
    push:
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    docker:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/studip/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/mewsen/studip:latest
                      ghcr.io/mewsen/studip:${{ github.sha }}
